<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<link href="style10.css" rel="stylesheet">
<script>
    function playSong() {
      document.getElementById("birthday-song").play();
    }
    </script>
<body>
    <div class="card" id="greeting-card">
      <h1>Happy Birthday!</h1>
      <p class="message">
        Wishing you all the happiness and joy on your special day Smriti👸🏻
      </p>
      <div class="card-links">
        <a href="#send" class="send-link" onclick="playSong()">Click here</a>
      </div>
  	</div>
    <section id="send">
      <audio id="birthday-song" loop>
        <source src="https://cdn.pixabay.com/download/audio/2026/01/22/audio_25e64d5b94.mp3?filename=nastelbom-happy-birthday-471481.mp3" 
        type="audio/mpeg">
      </audio>
    </section>
  </body>
</html>
